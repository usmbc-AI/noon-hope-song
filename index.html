<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>정오의 희망곡 · 자동 선곡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FFF6E6;
    --paper-2:#FDEBCE;
    --sun:#F6A609;
    --sun-deep:#E8890C;
    --ink:#163A3C;
    --ink-soft:#2C5254;
    --coral:#EB6A54;
    --text:#33302A;
    --line:rgba(22,58,60,.14);
    --line-strong:rgba(22,58,60,.28);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:"Gowun Dodum",system-ui,sans-serif;
    color:var(--text);
    background:
      radial-gradient(120% 90% at 50% -10%, #FFE7A8 0%, var(--paper) 42%, var(--paper-2) 100%);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:760px;margin:0 auto;padding:26px 20px 60px}

  /* ── Hero ── */
  .hero{position:relative;text-align:center;padding:14px 0 6px}
  .eyebrow{
    font-family:"Gowun Dodum";letter-spacing:.28em;font-size:12px;
    color:var(--ink-soft);text-transform:uppercase;margin:0 0 14px
  }
  .sun-stage{position:relative;width:132px;height:132px;margin:2px auto 10px}
  .sun-svg{width:100%;height:100%;display:block}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes glow{0%,100%{opacity:.9}50%{opacity:.55}}
  .rays{transform-origin:66px 66px;animation:spin 60s linear infinite}
  .halo{animation:glow 4s ease-in-out infinite}
  .title{
    font-family:"Black Han Sans",sans-serif;font-weight:400;
    font-size:clamp(38px,10vw,60px);line-height:.98;color:var(--ink);
    margin:2px 0 2px;letter-spacing:-.01em
  }
  .title .hope{color:var(--sun-deep)}
  .subtitle{font-size:14px;color:var(--ink-soft);margin:0 0 20px}

  /* ── Today card ── */
  .today{
    background:rgba(255,255,255,.62);
    border:1px solid var(--line);
    border-radius:20px;padding:18px 20px;margin:0 auto 22px;
    display:flex;align-items:center;justify-content:space-between;gap:14px;
    box-shadow:0 10px 30px -22px rgba(22,58,60,.5);
  }
  .today .date-block{text-align:left}
  .today .dow{font-family:"Black Han Sans";font-size:26px;color:var(--ink);line-height:1}
  .today .date{font-size:13px;color:var(--ink-soft);margin-top:5px}
  .today .season-tag{
    display:inline-block;margin-top:8px;font-size:12px;
    background:var(--ink);color:#FFF4DC;border-radius:999px;padding:3px 11px
  }
  .today .wx{text-align:right;min-width:120px}
  .today .temp{font-family:"Black Han Sans";font-size:34px;color:var(--coral);line-height:1}
  .today .cond{font-size:13px;color:var(--ink-soft);margin-top:4px}
  .today .wx-sub{font-size:11px;color:var(--ink-soft);opacity:.8;margin-top:3px}

  /* fallback weather picker */
  .wx-fallback{margin:-8px 0 22px;text-align:center;font-size:13px;color:var(--ink-soft)}
  .wx-fallback select{
    font-family:inherit;font-size:13px;padding:6px 10px;border-radius:10px;
    border:1px solid var(--line-strong);background:#fff;color:var(--text);margin-left:6px
  }

  /* ── Button ── */
  .cta{
    display:block;width:100%;font-family:"Black Han Sans";font-size:19px;
    color:#FFF7E4;background:linear-gradient(180deg,var(--sun) 0%,var(--sun-deep) 100%);
    border:none;border-radius:16px;padding:16px;cursor:pointer;letter-spacing:.02em;
    box-shadow:0 12px 24px -12px var(--sun-deep);transition:transform .12s ease,filter .12s ease;
  }
  .cta:hover{filter:brightness(1.04)}
  .cta:active{transform:translateY(1px) scale(.995)}
  .cta:disabled{filter:grayscale(.3) brightness(.95);cursor:progress;opacity:.85}
  .cta .sub{display:block;font-family:"Gowun Dodum";font-size:12px;opacity:.9;margin-top:3px;letter-spacing:0}
  .cta.ghost{background:#fff;color:var(--sun-deep);border:1.5px solid var(--sun);box-shadow:none;font-size:16px}
  .cta.ghost:hover{background:#FFF9EE}
  .manual{margin-top:14px;text-align:center}
  .manual-or{font-size:12px;color:var(--ink-soft);opacity:.8;margin-bottom:10px}
  #moodInput{width:100%;font-family:"Gowun Dodum";font-size:15px;padding:13px 14px;margin-bottom:8px;
    border:1px solid var(--line-strong);border-radius:14px;background:#fff;color:var(--text);text-align:center}
  #moodInput:focus{outline:none;border-color:var(--sun)}

  /* ── Loading ── */
  .loading{text-align:center;padding:34px 0;color:var(--ink-soft);display:none}
  .loading.on{display:block}
  .dial{width:56px;height:56px;margin:0 auto 12px;border-radius:50%;
    border:3px solid var(--line);border-top-color:var(--sun-deep);animation:spin 1s linear infinite}
  .loading p{margin:0;font-size:14px}

  /* ── Result ── */
  #result{margin-top:26px}
  .opening{
    background:linear-gradient(180deg,rgba(255,255,255,.75),rgba(255,255,255,.5));
    border:1px solid var(--line);border-left:4px solid var(--sun-deep);
    border-radius:16px;padding:20px 22px;margin-bottom:22px;
  }
  .opening .lbl{font-size:11px;letter-spacing:.2em;color:var(--sun-deep);text-transform:uppercase;margin:0 0 8px}
  .opening p{font-family:"Gowun Batang";font-size:16px;line-height:1.7;margin:0;color:var(--text)}
  .opening .mood-summary{font-size:13px;color:var(--ink-soft);margin-top:10px;font-family:"Gowun Dodum"}
  .moods{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}
  .mood{font-size:12px;background:var(--paper-2);border:1px solid var(--line);color:var(--ink);border-radius:999px;padding:4px 12px}

  .cue-head{
    display:flex;align-items:baseline;justify-content:space-between;
    border-bottom:2px solid var(--ink);padding-bottom:8px;margin-bottom:6px
  }
  .cue-head h2{font-family:"Black Han Sans";font-size:20px;color:var(--ink);margin:0}
  .cue-head span{font-size:12px;color:var(--ink-soft)}

  .track{
    display:flex;gap:14px;padding:16px 4px;border-bottom:1px solid var(--line);
    opacity:0;transform:translateY(8px);animation:rise .5s ease forwards;
  }
  @keyframes rise{to{opacity:1;transform:none}}
  .track .no{font-family:"Black Han Sans";font-size:20px;color:var(--sun-deep);min-width:26px;line-height:1.4}
  .track .art{width:46px;height:46px;border-radius:9px;object-fit:cover;border:1px solid var(--line);flex-shrink:0}
  .track .body{flex:1;min-width:0}
  .track .song{font-size:16px;font-weight:700;color:var(--ink);font-family:"Gowun Dodum"}
  .track .artist{color:var(--ink-soft);font-weight:400}
  .digbadge{
    display:inline-block;font-family:"Gowun Dodum";font-size:11px;font-weight:400;
    color:#fff;background:var(--ink);border-radius:999px;padding:2px 9px;margin-left:8px;
    vertical-align:middle;letter-spacing:.02em
  }
  .digbadge.popbadge{background:var(--coral)}
  .digbadge.charthit{background:#2E6FB0}
  .track.is-indie{background:linear-gradient(90deg,rgba(246,166,9,.08),transparent 70%)}
  .track.is-indie .no{color:var(--ink)}
  .track .meta{font-size:11.5px;color:var(--ink-soft);opacity:.85;margin-top:3px}
  .track .comment{font-family:"Gowun Batang";font-size:14px;color:var(--text);margin-top:6px;line-height:1.65}
  .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
  .tagchip{font-size:10.5px;background:var(--paper-2);border:1px solid var(--line);color:var(--ink-soft);border-radius:999px;padding:1px 8px}

  .mood-tag{font-size:13px;color:var(--ink);background:rgba(235,106,84,.12);border:1px solid var(--line);
    border-radius:10px;padding:8px 12px;margin:8px 0 2px}
  .reroll-hint{font-size:12.5px;color:var(--ink-soft);background:rgba(246,166,9,.10);
    border:1px solid var(--line);border-radius:10px;padding:9px 12px;margin:10px 0 2px;line-height:1.55}
  .keepwrap{display:flex;align-items:flex-start;padding-top:3px;cursor:pointer}
  .keepbox{width:18px;height:18px;accent-color:var(--sun-deep);cursor:pointer}
  .again{
    margin:24px auto 0;display:block;width:100%;font-family:"Gowun Dodum";font-size:15px;text-align:center;
    color:var(--ink);background:transparent;border:1px solid var(--line-strong);
    border-radius:12px;padding:12px 20px;cursor:pointer
  }
  .again-sub{display:block;font-size:11px;opacity:.85;margin-top:3px}
  .again:hover{background:rgba(255,255,255,.5)}

  .foot{text-align:center;font-size:11.5px;color:var(--ink-soft);opacity:.75;margin-top:30px;line-height:1.6}

  .err{background:#fff;border:1px solid var(--coral);border-radius:14px;padding:16px;color:var(--coral);font-size:14px;margin-top:20px}
  .banner{background:rgba(22,58,60,.06);border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin-bottom:16px;font-size:13px;color:var(--ink-soft)}

  @media (max-width:480px){
    .today{flex-direction:column;align-items:stretch}
    .today .wx{text-align:left}
  }
  @media (prefers-reduced-motion:reduce){
    .rays,.halo,.dial{animation:none!important}
    .track{animation:none;opacity:1;transform:none}
  }
</style>

<div class="wrap">
  <div class="hero">
    <p class="eyebrow">울산MBC 98.7MHz</p>
    <div class="sun-stage">
      <svg class="sun-svg" viewBox="0 0 132 132" aria-hidden="true">
        <circle class="halo" cx="66" cy="66" r="46" fill="#FFDF9E"/>
        <g class="rays" stroke="var(--sun)" stroke-width="4" stroke-linecap="round">
          <line x1="66" y1="8"  x2="66" y2="22"/>
          <line x1="66" y1="110" x2="66" y2="124"/>
          <line x1="8"  y1="66" x2="22" y2="66"/>
          <line x1="110" y1="66" x2="124" y2="66"/>
          <line x1="25" y1="25" x2="35" y2="35"/>
          <line x1="97" y1="97" x2="107" y2="107"/>
          <line x1="107" y1="25" x2="97" y2="35"/>
          <line x1="35" y1="97" x2="25" y2="107"/>
        </g>
        <circle cx="66" cy="66" r="30" fill="var(--sun)"/>
        <circle cx="66" cy="66" r="30" fill="none" stroke="var(--sun-deep)" stroke-width="2"/>
      </svg>
    </div>
    <h1 class="title">정오의 <span class="hope">희망곡</span></h1>
    <p class="subtitle">AI가 추천해주는 오늘의 노래</p>
  </div>

  <div class="today" id="today">
    <div class="date-block">
      <div class="dow" id="dow">—</div>
      <div class="date" id="date">날짜 불러오는 중…</div>
      <span class="season-tag" id="season">—</span>
    </div>
    <div class="wx" id="wx">
      <div class="temp" id="temp">··°</div>
      <div class="cond" id="cond">날씨 확인 중…</div>
      <div class="wx-sub" id="wxsub"></div>
    </div>
  </div>

  <div class="wx-fallback" id="fallback" style="display:none">
    날씨를 자동으로 못 읽었어요. 오늘 울산 날씨를 골라주세요:
    <select id="wxpick">
      <option value="맑음">☀️ 맑음</option>
      <option value="구름 많음">⛅ 구름 많음</option>
      <option value="흐림">☁️ 흐림</option>
      <option value="비">🌧️ 비</option>
      <option value="눈">❄️ 눈</option>
      <option value="안개">🌫️ 안개</option>
    </select>
  </div>

  <button class="cta" id="go">오늘의 선곡표 만들기 🌞</button>

  <div class="manual">
    <div class="manual-or">— 또는, 진행자가 무드를 직접 정하고 싶다면 —</div>
    <input id="moodInput" type="text" maxlength="60"
      placeholder="예) 비 오는 날의 위로 · 설레는 봄 출근길 · 새벽 감성 드라이브">
    <button class="cta ghost" id="goManual">🎙️ 이 무드로 선곡하기</button>
  </div>

  <div class="loading" id="loading">
    <div class="dial"></div>
    <p id="loadmsg">주파수를 맞추는 중…</p>
  </div>

  <div id="result"></div>

  <p class="foot">
    후보 곡은 <b>Apple Music/iTunes의 실제 음원 목록</b>에서 모으고,
    <b>Last.fm 무드 태그</b>로 분위기를 구분해 <b>AI가 오늘 무드에 맞춰</b> 골랐습니다.<br>
    선곡은 참고용이며, 방송 전 음원·저작권은 한 번 더 확인해 주세요.
  </p>
</div>

<script>
const ULSAN = {lat:35.5384, lon:129.3114};
let weatherText = null;   // 사람이 읽을 날씨 문자열
let weatherDetail = "";   // 기온/습도 등 부가정보
let weatherAlert = "";    // 폭염/한파/호우 등 특보 수준(직접 산출)
let wx = {temp:null, feel:null, humidity:null, wind:null, precip:0}; // 숫자형

// ---------- 날짜 / 계절 ----------
const DOW = ["일요일","월요일","화요일","수요일","목요일","금요일","토요일"];
const now = new Date();
function seasonOf(m){ // m: 1-12
  if(m>=3&&m<=5)return "봄";
  if(m>=6&&m<=8)return "여름";
  if(m>=9&&m<=11)return "가을";
  return "겨울";
}
// 2026 주요 기념일(양력+주요 음력)
const HOLIDAYS = {
  "1-1":"신정","2-16":"설날 연휴","2-17":"설날","2-18":"설날 연휴",
  "3-1":"삼일절","5-5":"어린이날","5-24":"부처님오신날","6-6":"현충일",
  "8-15":"광복절","9-24":"추석 연휴","9-25":"추석","9-26":"추석 연휴",
  "10-3":"개천절","10-9":"한글날","12-25":"성탄절"
};
const M=now.getMonth()+1, D=now.getDate();
const season = seasonOf(M);
const holiday = HOLIDAYS[`${M}-${D}`] || null;

// ---------- 24절기 (근사 날짜 · 의미) ----------
const SOLAR_TERMS = [
  {m:1,d:6,name:"소한",mean:"한 해 중 가장 추운 무렵의 시작"},
  {m:1,d:20,name:"대한",mean:"큰 추위, 겨울의 매듭"},
  {m:2,d:4,name:"입춘",mean:"봄의 문턱, 새 기운이 도는 때"},
  {m:2,d:19,name:"우수",mean:"눈이 녹아 비가 되는, 봄비의 시작"},
  {m:3,d:6,name:"경칩",mean:"겨울잠 자던 것들이 깨어나는 때"},
  {m:3,d:21,name:"춘분",mean:"낮과 밤의 길이가 같아지는 봄의 한가운데"},
  {m:4,d:5,name:"청명",mean:"하늘이 맑고 화창해지는 때"},
  {m:4,d:20,name:"곡우",mean:"촉촉한 봄비가 곡식을 적시는 때"},
  {m:5,d:6,name:"입하",mean:"여름의 문턱, 신록이 짙어지는 때"},
  {m:5,d:21,name:"소만",mean:"햇살이 풍성해지고 만물이 자라는 때"},
  {m:6,d:6,name:"망종",mean:"씨 뿌리기 좋은, 부지런한 초여름"},
  {m:6,d:21,name:"하지",mean:"낮이 가장 긴 여름의 절정"},
  {m:7,d:7,name:"소서",mean:"본격적인 더위가 시작되는 때"},
  {m:7,d:23,name:"대서",mean:"한 해 중 가장 더운 무렵"},
  {m:8,d:7,name:"입추",mean:"가을의 문턱, 더위 속 서늘함이 스미는 때"},
  {m:8,d:23,name:"처서",mean:"더위가 한풀 꺾이는 때"},
  {m:9,d:8,name:"백로",mean:"이슬이 맺히기 시작하는 초가을"},
  {m:9,d:23,name:"추분",mean:"낮과 밤이 같아지는 가을의 한가운데"},
  {m:10,d:8,name:"한로",mean:"찬 이슬이 내리는, 깊어가는 가을"},
  {m:10,d:24,name:"상강",mean:"서리가 내리기 시작하는 때"},
  {m:11,d:7,name:"입동",mean:"겨울의 문턱"},
  {m:11,d:22,name:"소설",mean:"첫눈이 오기 시작하는 때"},
  {m:12,d:7,name:"대설",mean:"눈이 많이 내리는 한겨울"},
  {m:12,d:22,name:"동지",mean:"밤이 가장 긴 날, 다시 해가 길어지는 전환점"}
];
function currentSolarTerm(mo,da){
  const key=mo*100+da;
  let cur=SOLAR_TERMS[SOLAR_TERMS.length-1]; // 기본: 동지(연초 소한 전 구간)
  for(const t of SOLAR_TERMS){ if(t.m*100+t.d<=key) cur=t; }
  return cur;
}
const term = currentSolarTerm(M,D);
// 절기는 '절기 당일'에만 기념하듯 사용 (매일 반복 방지)
const isTermDay = SOLAR_TERMS.some(t=>t.m===M && t.d===D);

document.getElementById("dow").textContent = DOW[now.getDay()];
document.getElementById("date").textContent =
  `${now.getFullYear()}년 ${M}월 ${D}일` + (holiday?` · ${holiday}`:"");
document.getElementById("season").textContent = season + (isTermDay?` · ${term.name}`:"");
if(isTermDay) document.getElementById("season").title = `${term.name} — ${term.mean}`;

// ---------- 날씨(Open-Meteo) ----------
const WMO = {
  0:"맑음",1:"대체로 맑음",2:"구름 조금",3:"흐림",
  45:"안개",48:"짙은 안개",
  51:"이슬비",53:"이슬비",55:"강한 이슬비",
  61:"약한 비",63:"비",65:"강한 비",
  66:"진눈깨비",67:"진눈깨비",
  71:"약한 눈",73:"눈",75:"강한 눈",77:"싸락눈",
  80:"소나기",81:"소나기",82:"강한 소나기",
  85:"눈 소나기",86:"눈 소나기",
  95:"천둥번개",96:"천둥번개",99:"강한 천둥번개"
};
// Open-Meteo 데이터로 기상청 특보 수준을 근사 산출 (폭염·한파·호우·강풍)
// Open-Meteo(날씨) + 대기질(PM10) 데이터로 기상청 특보 종류를 근사 판정
// 폭염·한파·강풍·태풍급·호우·대설·건조·황사(미세먼지)
function computeAlerts(){
  const a=[]; const t=wx.temp, f=(wx.feel??wx.temp), h=wx.humidity, w=wx.wind, p=wx.precip||0, sn=wx.snow||0, pm=wx.pm10; const cond=weatherText||"";
  // 기온 — 폭염 / 한파
  if(f!=null){
    if(f>=35) a.push(`폭염경보 수준(체감 ${f}도)`);
    else if(f>=33) a.push(`폭염주의보 수준(체감 ${f}도)`);
    else if(f>=31) a.push(`무더위(체감 ${f}도)`);
    else if(f<=-12) a.push(`한파경보 수준(체감 ${f}도)`);
    else if(f<=-9) a.push(`한파주의보 수준(체감 ${f}도)`);
    else if(f<=0) a.push(`쌀쌀한 추위(체감 ${f}도)`);
  }
  // 바람 — 태풍급(강풍+호우) / 강풍
  if(w!=null&&w>=50&&p>=15) a.push(`태풍급 강풍·호우(바람 ${w}km/h)`);
  else if(w!=null&&w>=35) a.push(`강풍(바람 ${w}km/h)`);
  // 비 — 호우
  if(p>=15||/천둥/.test(cond)) a.push("호우 수준(강한 비)");
  else if(p>=4||/강한 비|소나기/.test(cond)) a.push("비");
  // 눈 — 대설
  if(sn>=5) a.push("대설 수준(많은 눈)");
  else if(sn>=1||/눈/.test(cond)) a.push("눈");
  // 습도 — 후텁지근 / 건조
  if(h!=null&&h>=80&&t!=null&&t>=25) a.push("높은 습도로 후텁지근");
  else if(h!=null&&h<=25&&!/비|눈|소나기/.test(cond)) a.push("건조주의보 수준(매우 건조)");
  // 대기질 — 황사 / 미세먼지
  if(pm!=null){
    if(pm>=150) a.push(`황사·미세먼지 매우나쁨(PM10 ${Math.round(pm)})`);
    else if(pm>=80) a.push(`미세먼지 나쁨(PM10 ${Math.round(pm)})`);
  }
  return a;
}

function esc(s){return String(s??"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function setLoad(msg){const el=document.getElementById("loadmsg"); if(el)el.textContent=msg;}
function normKey(s){
  return String(s||"").toLowerCase()
    .replace(/\(.*?\)|\[.*?\]|【.*?】/g,"")
    .replace(/feat.*|with .*|ft\..*/gi,"")
    .replace(/[\s\-_.,'"!?~·・&]/g,"");
}
// 대표(주) 아티스트 키 — 피처링/합작(예: "Ariana Grande & Justin Bieber")에서 앞의 대표 가수만
function primaryArtistKey(a){
  let s=String(a||"").replace(/\(.*?\)|\[.*?\]/g,"");
  s=s.split(/\s+(?:&|feat\.?|ft\.?|featuring|with|x|×|vs\.?)\s+|,\s*/i)[0];
  return normKey(s);
}
function mulberry32(seed){return function(){let t=seed+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296;};}
async function mapLimit(arr,limit,fn){
  const out=new Array(arr.length); let i=0;
  async function w(){ while(i<arr.length){ const idx=i++; out[idx]=await fn(arr[idx],idx); } }
  await Promise.all(Array.from({length:Math.min(limit,arr.length)},w));
  return out;
}
// iTunes/RSS 등 JSONP 지원 엔드포인트용 (브라우저 교차출처 우회)
function jsonp(url,timeout=7000){
  return new Promise(resolve=>{
    const cb="jcb_"+Math.random().toString(36).slice(2);
    const el=document.createElement("script");
    let done=false;
    const finish=v=>{if(done)return;done=true;try{delete window[cb];}catch(_){}
      if(el.parentNode)el.parentNode.removeChild(el);resolve(v);};
    window[cb]=d=>finish(d);
    el.onerror=()=>finish(null);
    el.src=url+(url.includes("?")?"&":"?")+"callback="+cb;
    document.head.appendChild(el);
    setTimeout(()=>finish(null),timeout);
  });
}

// iTunes 요청 폭주(403/429) 방지: 만든 곡 풀을 12시간 브라우저 캐시
function loadPoolCache(){

    if(o && (Date.now()-o.ts) < 12*3600e3 && Array.isArray(o.pool) && o.pool.length>=20) return o.pool;
  }catch(_){}
  return null;
}
function savePoolCache(pool){

// 곡 풀은 서버(/api/pool)에서 수집 — 브라우저가 iTunes를 직접 안 부르므로

async function buildPool(){
  const cached=loadPoolCache();
  if(cached) return cached;
  try{
    const j=await (await fetch("/api/pool")).json();
    const pool=Array.isArray(j.pool)?j.pool:[];
    if(pool.length>=12) savePoolCache(pool);
    return pool;
  }catch(_){ return []; }
}

let selPool=null;             // 세션 내 재사용 곡 풀
const seenKeys=new Set();     // 지금까지 보여준 곡 (중복 방지)
let currentOut=null;          // 현재 선곡 결과

async function getPool(){ if(selPool&&selPool.length) return selPool; selPool=await buildPool(); return selPool; }

// 후보 풀에서 국내/팝 비율 + 다양성(아티스트당 최대 2곡) + 시드로 shortlist 추림
function prefilter(pool,n,salt=0){
  const doy=Math.floor((now-new Date(now.getFullYear(),0,0))/864e5);
  const rnd=mulberry32(now.getFullYear()*1000+doy+salt*997);
  const shuffle=arr=>{ for(let i=arr.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; };
  const pickDiverse=(arr,cnt)=>{
    const per={}; const out=[];
    for(const s of arr){ const k=primaryArtistKey(s.artist); const c=per[k]||0; if(c>=2)continue; per[k]=c+1; out.push(s); if(out.length>=cnt)break; }
    return out;
  };
  const tops=shuffle(pool.filter(s=>s.chartTop)).slice(0,2); // 차트 상위곡 우선 확보
  const topKeys=new Set(tops.map(keyOfSong));
  const pop=shuffle(pool.filter(s=>s.origin==="pop"));
  const kr =shuffle(pool.filter(s=>s.origin!=="pop" && !topKeys.has(keyOfSong(s))));
  const nPop=Math.min(pop.length, Math.round(n*0.35)); // 팝 후보 ~35% (최종 3~4곡 여유 확보)
  const picked=[...tops, ...pickDiverse(pop,nPop), ...pickDiverse(kr, Math.max(0,n-nPop-tops.length))];
  return shuffle(picked);
}

function readTagCache(a,t){
  try{const raw=localStorage.getItem("tag:"+a+"|"+t); if(!raw)return null;
    const o=JSON.parse(raw); if(Date.now()-o.ts>30*864e5)return null; return o.tags;}catch(_){return null;}
}
function writeTagCache(a,t,tags){
  try{localStorage.setItem("tag:"+a+"|"+t,JSON.stringify({ts:Date.now(),tags}));}catch(_){}
}
async function fetchTags(list){
  const need=[];
  list.forEach(s=>{ const c=readTagCache(s.artist,s.title); if(c)s.tags=c; else need.push(s); });
  if(need.length){
    try{
      const r=await fetch("/api/tags",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({tracks:need.map(s=>({artist:s.artist,title:s.title}))})});
      if(r.ok){
        const j=await r.json(); const map=j.tags||{};
        need.forEach(s=>{ const t=map[`${s.artist}|${s.title}`]||[]; s.tags=t; writeTagCache(s.artist,s.title,t); });
      }
    }catch(_){ /* 태그 실패해도 선곡은 진행 */ }
  }
  list.forEach(s=>{ if(!s.tags)s.tags=[]; });
  return list;
}

async function aiSelect(candidates, opts={}){
  const context={

    season, term:(isTermDay?term.name:null), termMeaning:(isTermDay?term.mean:null), holiday,

  };
  const kept=(opts.kept||[]).map(s=>({title:s.title,artist:s.artist,origin:s.origin}));
  const need=opts.need||TOTAL;
  const r=await fetch("/api/select",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({context, kept, need, total:TOTAL,
      candidates:candidates.map(s=>({title:s.title,artist:s.artist,genre:s.genre,year:s.year,tags:s.tags,origin:s.origin,indie:(s.indie!=null?!!s.indie:INDIE_ARTISTS.has(s.artist)),chart:!!s.chartTop}))})});
  if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.error||("select "+r.status)); }
  return await r.json();
}

// AI가 고른 곡에 풀의 메타데이터(앨범/장르/연도/아트워크/태그) 다시 붙이기
function attachMeta(out,pool){
  const idx={}; pool.forEach(s=>{ idx[normKey(s.title)+"|"+normKey(s.artist)]=s; });
  out.songs=(out.songs||[]).map(s=>{
    const m=idx[normKey(s.title)+"|"+normKey(s.artist)];
    const artist=s.artist||(m?m.artist:"");
    const origin=m?m.origin:"";
    return {
      title:s.title, artist, origin,
      pop: origin==="pop",
      indie: origin!=="pop" && (s.indie===true || (m&&m.indie) || INDIE_ARTISTS.has(artist)),
      chartTop: m?!!m.chartTop:false,
      comment: s.reason||s.comment||"",
      genre:m?m.genre:"", year:m?m.year:"", album:m?m.album:"",
      artwork:m?m.artwork:"", url:m?m.url:"", tags:m?(m.tags||[]):[]
    };
  });
  // 같은 (대표)아티스트는 1곡만 (안전장치 — 피처링·합작 포함해서 제거)
  const seenArtist=new Set();
  out.songs=out.songs.filter(s=>{ const k=primaryArtistKey(s.artist); if(seenArtist.has(k))return false; seenArtist.add(k); return true; });
  return out;
}

// 다시 선곡하기: 체크한 곡은 유지, 나머지를 새 곡으로 (이미 나온 곡 제외)
async function reselect(){ await runSelection(getCheckedKept()); }
function getCheckedKept(){
  if(!currentOut) return [];
  const kept=[];
  document.querySelectorAll(".keepbox").forEach(b=>{
    if(b.checked){ const i=+b.dataset.idx; if(currentOut.songs[i]) kept.push(currentOut.songs[i]); }
  });
  return kept;
}

async function runSelection(kept){
  const btn=document.getElementById("go");
  btn.disabled=true;
  document.getElementById("loading").classList.add("on");
  setLoad(currentOut?"새로운 곡을 고르는 중…":"주파수를 맞추는 중…");
  try{
    setLoad("실제 음원 목록을 모으는 중…");
    const pool=await getPool();
    if(!pool.length) throw new Error("음원 목록(iTunes)을 가져오지 못했어요. 잠시 후 다시 시도해 주세요.");
    const need=TOTAL-kept.length;
    if(need<=0){ render(currentOut); return; } // 모두 유지 → 변화 없음

    const keptArtists=new Set(kept.map(s=>primaryArtistKey(s.artist)));
    const avail=pool.filter(s=> !seenKeys.has(keyOfSong(s)) && !keptArtists.has(primaryArtistKey(s.artist)));
    if(!avail.length) throw new Error("새로 추천할 곡이 더 없어요. (후보를 거의 다 썼어요) — GO 버튼으로 처음부터 다시 시작해 보세요.");

    const shortlist=prefilter(avail, Math.max(need*6,40), seenKeys.size+1);
    setLoad("곡의 무드 태그를 살피는 중…");
    await fetchTags(shortlist);
    setLoad(kept.length?"나머지를 새 곡으로 바꾸는 중…":"오늘 무드에 맞는 곡을 고르는 중…");
    const aiOut=await aiSelect(shortlist, {kept, need});
    let fresh=attachMeta(aiOut, pool).songs
      .filter(s=> !seenKeys.has(keyOfSong(s)) && !keptArtists.has(primaryArtistKey(s.artist)));

    const songs=[...kept, ...fresh].slice(0,TOTAL);
    if(!songs.length) throw new Error("AI 선곡 결과가 비었어요.");

    // 차트 상위곡(아이돌 히트) 최소 1곡 보장 (AI가 안 넣었으면 주입)
    if(!songs.some(s=>s.chartTop)){
      const used=new Set(songs.map(s=>primaryArtistKey(s.artist)));
      const cand = pool.find(s=> s.chartTop && !used.has(primaryArtistKey(s.artist)) && !seenKeys.has(keyOfSong(s)))
                || pool.find(s=> s.chartTop && !used.has(primaryArtistKey(s.artist)));
      if(cand){
        const inj={title:cand.title,artist:cand.artist,origin:"kr",pop:false,indie:false,chartTop:true,
          comment:"지금 인기차트 상위에 오른 곡이에요. 오늘의 선곡에 대중적인 활기를 한 스푼 더했어요.",
          genre:cand.genre,year:cand.year,album:cand.album,artwork:cand.artwork,url:cand.url,tags:cand.tags||[]};
        let ri=-1; for(let i=songs.length-1;i>=kept.length;i--){ if(!songs[i].chartTop){ri=i;break;} }
        if(ri>=0) songs[ri]=inj; else if(songs.length<TOTAL) songs.push(inj);
      }
    }
    currentOut={
      opening_ment: currentOut?currentOut.opening_ment:aiOut.opening_ment,
      mood_keywords: currentOut?currentOut.mood_keywords:aiOut.mood_keywords,
      mood_summary: currentOut?currentOut.mood_summary:aiOut.mood_summary,
      songs
    };
    songs.forEach(s=> seenKeys.add(keyOfSong(s)));
    render(currentOut, songs.length<TOTAL);
  }catch(e){
    console.error("선곡 실패:",e);
    document.getElementById("result").innerHTML=
      `<div class="err"><b>선곡을 불러오지 못했어요.</b><br><small style="opacity:.85">사유: ${esc(e.message||e)}</small><br><button class="again" id="retry" style="margin-top:12px">🔄 다시 시도</button></div>`;
    const rb=document.getElementById("retry"); if(rb) rb.addEventListener("click",()=>runSelection([]));
  }finally{
    document.getElementById("loading").classList.remove("on");
    btn.disabled=false;
  }
}

function render(out, short){
  const songs=Array.isArray(out.songs)?out.songs:[];
  const moods=(out.mood_keywords||[]).map(m=>`<span class="mood">#${esc(m)}</span>`).join("");
  const moodSummary = out.mood_summary ? `<p class="mood-summary">🎯 오늘의 무드 — ${esc(out.mood_summary)}</p>` : "";
  let html=`
    <div class="opening">
      <p class="lbl">오늘의 오프닝</p>
      <p>${esc(out.opening_ment)}</p>
      ${moodSummary}
      <div class="moods">${moods}</div>
    </div>
    <div class="cue-head">
      <h2>오늘의 선곡표</h2>
      <span>총 ${songs.length}곡 · 울산 ${esc(weatherText||"")}</span>
    </div>
    ${currentMood ? `<div class="mood-tag">🎙️ 진행자 무드: <b>${esc(currentMood)}</b></div>` : ""}
    <div class="reroll-hint">💡 마음에 드는 곡을 <b>체크 ☑</b> 하고 아래 <b>다시 선곡하기</b>를 누르면, 체크한 곡은 <b>유지</b>하고 나머지를 <b>새 곡</b>으로 바꿔드려요. (이미 나온 곡은 다시 안 나와요)</div>`;
  songs.forEach((s,i)=>{
    const indie = s.indie===true;
    const badge = (indie ? `<span class="digbadge">🎧 숨은 명곡</span>` : "")
                + (s.pop ? `<span class="digbadge popbadge">🌍 팝</span>` : "")
                + (s.chartTop ? `<span class="digbadge charthit">📈 차트 HIT</span>` : "");
    const art = s.artwork ? `<img class="art" src="${esc(s.artwork)}" alt="" loading="lazy">` : "";
    const metaBits=[s.genre,s.year,s.album].filter(Boolean).map(esc).join(" · ");
    const meta = metaBits ? `<div class="meta">${metaBits}</div>` : "";
    const tags = (s.tags||[]).length
      ? `<div class="tags">${s.tags.slice(0,6).map(t=>`<span class="tagchip">#${esc(t)}</span>`).join("")}</div>` : "";
    html+=`
      <div class="track ${indie?'is-indie':''}" style="animation-delay:${i*70}ms">
        <label class="keepwrap" title="체크하면 다시 선곡 시 이 곡을 유지해요"><input type="checkbox" class="keepbox" data-idx="${i}"></label>
        <div class="no">${String(i+1).padStart(2,"0")}</div>
        ${art}
        <div class="body">
          <div class="song">${esc(s.title)} <span class="artist">— ${esc(s.artist)}</span>${badge}</div>
          ${meta}
          <div class="comment">${esc(s.comment)}</div>
          ${tags}
        </div>
      </div>`;
  });
  const note = short ? `<div class="banner">🔁 후보를 거의 다 써서 ${songs.length}곡만 채웠어요. 처음부터 새로 하려면 위쪽 <b>오늘의 선곡표 만들기</b>를 눌러주세요.</div>` : "";
  html+= note + `<button class="again" id="again">🔄 다시 선곡하기<span class="again-sub">체크한 곡은 유지 · 나머지는 새 곡으로</span></button>`;
  document.getElementById("result").innerHTML=html;
  document.getElementById("again").addEventListener("click",reselect);
}

// desiredVibes: 오늘 날씨/계절 → 타깃 무드 키워드(선곡 AI에 힌트로 전달)
function desiredVibes(){
  const set=new Set(); const cond=weatherText||""; const t=wx.temp,h=wx.humidity,w=wx.wind;
  if(/비|소나기|이슬/.test(cond)){set.add("감성");set.add("위로");set.add("잔잔");}
  else if(/눈/.test(cond)){set.add("잔잔");set.add("위로");}
  else if(/흐림|안개/.test(cond)){set.add("잔잔");set.add("나른");}
  else if(/맑음/.test(cond)){set.add("설렘");set.add("신남");}
  else {set.add("설렘");set.add("잔잔");}
  if(t!=null){ if(t>=27){set.add("청량");set.add("드라이브");} else if(t<=5){set.add("위로");set.add("잔잔");} }
  if(h!=null&&h>=70) set.add("나른");
  if(w!=null&&w>=20){set.add("드라이브");set.add("청량");}
  if(season==="여름")set.add("청량"); if(season==="가을")set.add("감성");
  if(season==="겨울")set.add("위로"); if(season==="봄")set.add("설렘");
  return set;
}

document.getElementById("moodInput").addEventListener("keydown",e=>{ if(e.key==="Enter") generateManual(); });
